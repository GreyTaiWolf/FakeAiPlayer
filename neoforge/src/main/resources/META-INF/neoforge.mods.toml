modLoader = "javafml"
loaderVersion = "${neoforge_loader_version_range}"
license = "${mod_license}"

[[mixins]]
config = "fakeaiplayer.mixins.json"

[[mods]]
modId = "fakeaiplayer"
version = "${version}"
displayName = "${mod_name}"
authors = "${mod_author}"
credits = "${mod_credits}"
description = '''${mod_description}'''
displayURL = "${mod_homepage}"

[[dependencies.fakeaiplayer]]
modId = "neoforge"
type = "required"
versionRange = "[${neoforge_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.fakeaiplayer]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[features.fakeaiplayer]
javaVersion = "[21,)"
