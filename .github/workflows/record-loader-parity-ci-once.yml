name: Record loader parity CI once

on:
  push:
    branches:
      - agent/record-loader-parity-ci

permissions:
  contents: write

jobs:
  patch-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out documentation branch
        uses: actions/checkout@v6
        with:
          ref: agent/record-loader-parity-ci
          fetch-depth: 0

      - name: Record completed parity validation
        run: |
          python - <<'PY'
          from pathlib import Path

